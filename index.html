<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AP simple web apps collection</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e2e8f0;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      opacity: 0.7;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 25px;
      text-decoration: none;
      color: var(--text);
      backdrop-filter: blur(10px);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(56,189,248,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(56,189,248,0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .title {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 0.9rem;
      opacity: 0.6;
    }

    footer {
      margin-top: auto;
      padding-top: 40px;
      font-size: 0.8rem;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <h1>AP simple web apps collection</h1>
  <p>Click one to open</p>

  <div class="grid" id="appGrid"></div>

  <footer>
    Built with ✨
  </footer>

  <script>
    // Easily extend this list later
    const apps = [
      { name: "Clock", path: "clock", desc: "An analog clock" },
      { name: "Flip Clock", path: "flip-clock", desc: "Animated flip clock" },
      { name: "Weather", path: "weather", desc: "Trace weather history" },
      { name: "World Time", path: "world-time", desc: "Time-zone across world" },
      { name: "My IP", path: "my-ip", desc: "Check what is my public IP " }
    ];

    const grid = document.getElementById("appGrid");

    apps.forEach(app => {
      const a = document.createElement("a");
      a.href = `${app.path}/index.html`;
      a.className = "card";

      a.innerHTML = `
        <div class="title">${app.name}</div>
        <div class="desc">${app.desc}</div>
      `;

      grid.appendChild(a);
    });
  </script>

</body>
</html>
