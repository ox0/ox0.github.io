<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your IP Address</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      color: #c9d1d9;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 12px;
      background: #161b22;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
    }

    h1 {
      font-weight: normal;
      margin-bottom: 20px;
      color: #8b949e;
    }

    #ip {
      font-size: 2.5rem;
      font-weight: bold;
      color: #58a6ff;
      letter-spacing: 2px;
    }

    .loading {
      color: #8b949e;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Your Public IP</h1>
    <div id="ip" class="loading">Loading...</div>
  </div>

  <script>
    async function fetchIP() {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        document.getElementById('ip').textContent = data.ip;
      } catch (err) {
        document.getElementById('ip').textContent = 'Unable to fetch IP';
      }
    }

    fetchIP();
  </script>
</body>
</html>
