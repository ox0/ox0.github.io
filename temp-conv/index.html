<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Temperature Converter</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #e2e8f0;
  }

  .card {
    backdrop-filter: blur(16px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 16px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-size: 20px;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(0,0,0,0.4);
    color: #e2e8f0;
    font-size: 16px;
    margin-bottom: 20px;
  }

  .toggle {
    position: relative;
    width: 100%;
    height: 40px;
    background: rgba(0,0,0,0.4);
    border-radius: 999px;
    margin-bottom: 20px;
    cursor: pointer;
  }

  .toggle span {
    position: absolute;
    width: 50%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    z-index: 2;
  }

  .toggle .left { left: 0; }
  .toggle .right { right: 0; }

  .slider {
    position: absolute;
    width: 50%;
    height: 100%;
    background: #38bdf8;
    border-radius: 999px;
    transition: 0.3s ease;
    z-index: 1;
  }

  .toggle.active .slider {
    transform: translateX(100%);
  }

  .result {
    font-size: 20px;
    min-height: 28px;
  }

  .hint {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="card">
  <h1>Smart Converter</h1>

  <input type="text" id="inputValue" placeholder="e.g. 32F or 0C or 100">

  <div class="toggle" id="toggle">
    <div class="slider"></div>
    <span class="left">°C → °F</span>
    <span class="right">°F → °C</span>
  </div>

  <div class="result" id="result"></div>
  <div class="hint">Tip: Type 32F or 0C for auto-detect</div>
</div>

<script>
  const input = document.getElementById("inputValue");
  const resultDiv = document.getElementById("result");
  const toggle = document.getElementById("toggle");

  let mode = "cToF";

  function parseInput(value) {
    value = value.trim().toLowerCase();

    const match = value.match(/^(-?\d+(\.\d+)?)([cf])?$/);

    if (!match) return null;

    return {
      number: parseFloat(match[1]),
      unit: match[3] || null
    };
  }

  function convert() {
    const parsed = parseInput(input.value);

    if (!parsed) {
      resultDiv.textContent = "";
      return;
    }

    let { number, unit } = parsed;

    let result;

    // Auto-detect overrides toggle
    if (unit === "c") {
      result = (number * 9/5) + 32;
      resultDiv.textContent = `${number}°C = ${result.toFixed(2)}°F`;
      return;
    }

    if (unit === "f") {
      result = (number - 32) * 5/9;
      resultDiv.textContent = `${number}°F = ${result.toFixed(2)}°C`;
      return;
    }

    // No unit → use toggle mode
    if (mode === "cToF") {
      result = (number * 9/5) + 32;
      resultDiv.textContent = `${number}°C = ${result.toFixed(2)}°F`;
    } else {
      result = (number - 32) * 5/9;
      resultDiv.textContent = `${number}°F = ${result.toFixed(2)}°C`;
    }
  }

  input.addEventListener("input", convert);

  toggle.addEventListener("click", () => {
    toggle.classList.toggle("active");
    mode = (mode === "cToF") ? "fToC" : "cToF";
    convert();
  });
</script>

</body>
</html>
